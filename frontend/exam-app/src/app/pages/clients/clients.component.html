<div class="section-head">
  <div>
    <h1 class="h3 mb-1">Clients</h1>
    <p class="text-secondary mb-0">Manage the insured customers.</p>
  </div>
  <span class="badge text-bg-light">{{ clients.length }} total</span>
</div>

<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <h2 class="h6 mb-3">Create new client</h2>
    <form class="row g-3" (ngSubmit)="submitClient()">
      <div class="col-12 col-md-5">
        <label class="form-label" for="clientName">Name</label>
        <input
          id="clientName"
          class="form-control"
          type="text"
          [(ngModel)]="newClient.name"
          name="clientName"
          required
        />
      </div>
      <div class="col-12 col-md-5">
        <label class="form-label" for="clientEmail">Email</label>
        <input
          id="clientEmail"
          class="form-control"
          type="email"
          [(ngModel)]="newClient.email"
          name="clientEmail"
          required
        />
      </div>
      <div class="col-12 col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" type="submit">Create</button>
      </div>
    </form>
    <div *ngIf="successMessage" class="alert alert-success mt-3 mb-0">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-warning mt-3 mb-0">{{ errorMessage }}</div>
  </div>
</div>

<div *ngIf="loading" class="text-secondary">Loading clients...</div>
<div *ngIf="errorMessage && !successMessage" class="alert alert-warning">{{ errorMessage }}</div>

<div *ngIf="!loading && !errorMessage" class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let client of clients; trackBy: trackById">
          <td>{{ client.id }}</td>
          <td>{{ client.name || 'N/A' }}</td>
          <td>{{ client.email || 'N/A' }}</td>
        </tr>
        <tr *ngIf="clients.length === 0">
          <td colspan="3" class="text-center text-secondary">No clients found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
